name: harvest
description: Harvest Project App Client
publish_to: none
version: 2026.0516.01+250
environment:
  sdk: ^3.9.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.9.2
  go_router: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  liquid_glass_easy: ^1.1.1
  flutter_hooks: ^0.21.3+1
  flutter_native_splash: ^2.4.7
  logger: ^2.7.0
  path_provider: ^2.1.5
  path: ^1.9.1
  archive: ^4.0.9
  share_plus: ^12.0.2
  qbittorrent_api: ^1.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  transmission_api: ^0.0.2
  syncfusion_flutter_charts: ^31.1.19
  easy_refresh: ^3.5.0
  collection: ^1.19.1
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.3
  image_gallery_saver_plus: ^4.0.1
  pasteboard: ^0.5.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.2
  package_info_plus: ^9.0.1
  flutter_inappwebview: ^6.1.5
  flutter_markdown_plus: ^1.0.7
  file_picker: ^11.0.2
  adaptive_platform_ui: ^0.1.106
  toml: ^0.18.0
  url_launcher: ^6.3.2
  install_plugin_v3: ^3.1.3
  device_info_plus: ^12.4.0
  shadcn_flutter: ^0.0.52
  flutter_local_notifications: ^20.1.0
  window_manager: ^0.5.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
  - assets/images/
flutter_native_splash:
  web: false
  ios: true
  android: true
  color: '#ffffff'
  color_dark: '#0a0a0a'
  image: assets/launcher/launcher.png
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: '#ffffff'
    color_dark: '#0a0a0a'
    image: assets/launcher/launcher.png
flutter_launcher_icons:
  ios: true
  image_path_ios: assets/launcher/logo.png
  remove_alpha_ios: true
  android: true
  image_path_android: assets/launcher/logo.png
  adaptive_icon_background: '#ffffff'
  adaptive_icon_foreground: assets/launcher/logo.png
  macos:
    generate: true
    image_path: assets/launcher/logo.png
