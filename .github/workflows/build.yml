name: Build and Deploy All Dist
# 触发工作流的条件：手动触发（workflow_dispatch）或推送了 tag（例如 v1.0.0）
on:
  workflow_dispatch:
  push:
    tags:
      - '*'  # 匹配所有 tag，例如 v1.0.0

# 定义多个“任务”（jobs），每个任务表示构建一个平台的应用
jobs:

  linux: # 构建 Linux 桌面应用
    runs-on: ubuntu-latest
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
      - run: |
          sudo apt-get update -y  # 更新系统包信息
          sudo apt-get install -y \
               ninja-build \
               libgtk-3-dev \
               libasound2-dev \
               libudev-dev \
               liblzma-dev \
               clang \
               cmake \
               libmpv-dev \
               pkg-config  # 安装依赖（用于 Linux 构建）

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 打包 Linux x64 发行版
        run: flutter build linux --release

      - name: 生成 Linux x64 发行版文件名
        id: build_linux_x64  # 定义一个步骤 ID，用于后续引用
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          ARCH="x64"
          SYSTEM="linux"
          FILE_NAME="harvest_${VERSION}_${ARCH}_${SYSTEM}.tar.gz"
          tar -czvf $FILE_NAME -C build/linux/x64/release/bundle .
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=${VERSION}" >> $GITHUB_OUTPUT
          ls -l $FILE_NAME

      - name: 发布 Linux x64 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: ${{ github.workspace }}/${{ steps.build_linux_x64.outputs.file_name }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false


  android: # 构建 Android 应用
    runs-on: ubuntu-latest
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Java 环境
        uses: actions/setup-java@v5  # 设置 Java 环境（Android 编译需要）
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👇 关键步骤：还原 keystore 文件
      - name: 还原 Android 上传 keystore 文件
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # 👇 生成 key.properties 文件
      - name: 生成 Android key.properties 文件
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 同意 Android SDK 许可证
        run: yes | flutter doctor --android-licenses

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 打包 Android arm64 发行版
        run: flutter build apk --release --obfuscate --split-debug-info=build/symbols --split-per-abi  # 构建 64 位 Android 安装包

      - name: 生成 Android arm64 发行版文件名
        id: build_android_arm64  # 定义一个步骤 ID，用于后续引用
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          ARCH="arm64"
          SYSTEM="android"
          FILE_NAME="harvest_${VERSION}_${ARCH}-${SYSTEM}.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk $FILE_NAME
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=${VERSION}" >> $GITHUB_OUTPUT
          ls -l $FILE_NAME

      - name: 发布 Android arm64 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: ${{ github.workspace }}/${{ steps.build_android_arm64.outputs.file_name }}  # 上传 APK 文件
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false

  windows: # 构建 Windows 桌面应用
    runs-on: windows-latest
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 提取版本号和设置文件名
        id: app_info
        shell: pwsh
        run: |
          $versionLine = Get-Content pubspec.yaml | Where-Object { $_ -match '^version:\s*' }
          if (-not $versionLine) {
            Write-Error "Version not found in pubspec.yaml"
            exit 1
          }
          $version = ($versionLine -split ':\s*', 2)[1].Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: 打包 Windows x86 发行版
        run: flutter build windows --release

      - name: 生成 Windows x86 发行版文件名
        id: build_windows_x86  # 定义一个步骤 ID，用于后续引用
        shell: pwsh   # 👈 必须加！
        run: |
          $version = "${{ steps.app_info.outputs.version }}"
          $arch="x86_64"
          $FILE_NAME="harvest_${version}_${arch}-windows.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $FILE_NAME  # 压缩为 zip 文件
          echo "file_name=$FILE_NAME" >> $env:GITHUB_OUTPUT
          echo "app_version=$version" >> $env:GITHUB_OUTPUT
          ls -l $FILE_NAME
          Write-Host "✅ Created ZIP: $FILE_NAME"

      - name: 📦 Generate Setup Installer
        id: build_windows_setup
        shell: pwsh
        run: |
          Write-Host "0 Build Setup for Windows x64"
          choco install innosetup
          $version = "${{ steps.app_info.outputs.version }}"
          $versionWithDot = $version -replace '\+', '.'
          $SETUP_FILE_NAME="harvest_${version}_x86_64-windows-setup"
          
          Write-Host "1. 提取版本号和设置文件名"
          $parts = $versionWithDot -split '\.' | ForEach-Object {
            if ($_ -match '^\d+$') {
              [string][int]$_  # 关键：[int] 自动去除前导零
            } else {
              $_  # 非数字保留（但你的版本应该全是数字）
            }
          }
          
          Write-Host "2. 重组版本号（最多4段）"
          $winVersion = ($parts[0..3] -join '.')
          
          Write-Host "3. 生成 iss 脚本（内联）"
          $issContent = @"
          [Setup]
          AppName=Harvest
          AppId={{71709563-2F36-4E78-A348-33FC151E52B2}}
          AppVersion=$version
          VersionInfoVersion=$winVersion
          AppVerName=Harvest
          AppPublisher=NewPtools
          DefaultDirName={autopf}\Harvest
          OutputBaseFilename=$SETUP_FILE_NAME
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          SetupIconFile=assets/favicon.ico
          
          [Languages]
          Name: "chinese"; MessagesFile: "ChineseSimplified.isl";
          
          [Files]
          Source: "build/windows/x64/runner/Release/*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "附加任务:"; Flags: checkedonce 
          
          [Icons]
          Name: "{autoprograms}\Harvest"; Filename: "{app}\harvest.exe"
          Name: "{autodesktop}\Harvest"; Filename: "{app}\harvest.exe"; Tasks: desktopicon
          
          [Run]
          Filename: "{app}\harvest.exe"; Description: "打开 Harvest 应用程序"; Flags: nowait postinstall skipifsilent
          "@
          
          Write-Host "3. 用 GBK 编码写入 setup.iss"
          $encoding = [System.Text.Encoding]::GetEncoding(936)
          [System.IO.File]::WriteAllLines("setup.iss", $issContent, $encoding)
          
          Write-Host "4. 执行 Inno Setup 编译"
          if (test-path ".\setup.iss") {
            iscc setup.iss
          }
          
          if (test-path ".\${SETUP_FILE_NAME}.exe") {
            Write-Host "✅ Created EXE: ${SETUP_FILE_NAME}"
          } else {
            Write-Host "❌ Failed to create EXE: ${SETUP_FILE_NAME}"
          }
          echo "setup_file_name=${SETUP_FILE_NAME}.exe" >> $env:GITHUB_OUTPUT

      - name: 发布 Windows x86 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: |
            ${{ github.workspace }}/${{ steps.build_windows_x86.outputs.file_name }}
            ${{ github.workspace }}/Output/${{ steps.build_windows_setup.outputs.setup_file_name }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false


  macos_intel: # 构建 macOS 桌面应用
    runs-on: macos-15-intel
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 打包 macOS x86 发行版
        run: flutter build macos --release

      - name: 生成 macOS x86 发行版文件名
        id: build_macos_x86  # 定义一个步骤 ID，用于后续引用
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          ARCH="x86_64"
          SYSTEM="macos"
          FILE_NAME="harvest_${VERSION}_${ARCH}-${SYSTEM}"
          brew install create-dmg
          create-dmg \
            --volname $FILE_NAME \
            --background assets/images/background.png \
            --no-internet-enable \
            --window-size 640 300 \
            --icon-size 128 \
            --icon "harvest.app" 140 120 \
            --app-drop-link 500 120 \
            --hide-extension "harvest.app" \
            --format UDZO \
            ${FILE_NAME}.dmg \
             build/macos/Build/Products/Release/harvest.app
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          
          # --- 2. 生成 PKG (新增逻辑) ---
          # 创建 payload 目录结构
          mkdir -p pkg_payload
          cp -R build/macos/Build/Products/Release/harvest.app pkg_payload/
          
          # 执行 pkgbuild
          # --identifier: 必须唯一，通常用反向域名
          # --install-location: 安装目标路径 (/Applications)
          # --version: 版本号
          pkgbuild \
            --root pkg_payload \
            --identifier com.ptools.harvest \
            --install-location /Applications \
            --version "$VERSION" \
            "${FILE_NAME}.pkg"
          # 验证生成的文件
          ls -l $FILE_NAME.dmg

      - name: 发布 macOS x86 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: |
            ${{ github.workspace }}/${{ steps.build_macos_x86.outputs.file_name }}.dmg
            ${{ github.workspace }}/${{ steps.build_macos_x86.outputs.file_name }}.pkg
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false


  macos_arm: # 构建 macOS 桌面应用
    runs-on: macos-26
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 安装 Flutter 依赖
        run: flutter pub get
      - name: 打包 macOS arm64 发行版
        run: flutter build macos --release

      - name: 生成 macOS arm64 发行版文件名
        id: build_macos_arm  # 定义一个步骤 ID，用于后续引用
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          ARCH="arm64"
          SYSTEM="macos"
          FILE_NAME="harvest_${VERSION}_${ARCH}-${SYSTEM}"
          brew install create-dmg
          create-dmg \
            --volname $FILE_NAME \
            --background assets/images/background.png \
            --no-internet-enable \
            --window-size 640 300 \
            --icon-size 128 \
            --icon "harvest.app" 140 120 \
            --app-drop-link 500 120 \
            --hide-extension "harvest.app" \
            --format UDZO \
            ${FILE_NAME}.dmg \
             build/macos/Build/Products/Release/harvest.app 
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          
          
          # --- 2. 生成 PKG (新增逻辑) ---
          # 创建 payload 目录结构
          mkdir -p pkg_payload
          cp -R build/macos/Build/Products/Release/harvest.app pkg_payload/
          
          # 执行 pkgbuild
          # --identifier: 必须唯一，通常用反向域名
          # --install-location: 安装目标路径 (/Applications)
          # --version: 版本号
          pkgbuild \
            --root pkg_payload \
            --identifier com.ptools.harvest \
            --install-location /Applications \
            --version "$VERSION" \
            "${FILE_NAME}.pkg"
          # 验证生成的文件
          ls -l $FILE_NAME.dmg

      - name: 发布 macOS arm64 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: |
            ${{ github.workspace }}/${{ steps.build_macos_arm.outputs.file_name }}.dmg
            ${{ github.workspace }}/${{ steps.build_macos_arm.outputs.file_name }}.pkg
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false


  ios:
    runs-on: macos-26
    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 确保 Xcode 26 + 最新 iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail

          # ============================================================
          #  第一步：确认 Xcode 26 存在
          # ============================================================
          XCODE_APP=$(ls -1d /Applications/Xcode_26*.app 2>/dev/null | head -1 || true)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::Xcode 26 不存在，请先上传 Xcode 26.xip 到仓库 Release (tag: tools)"
            exit 1
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          sudo xcodebuild -license accept
          sudo xcodebuild -runFirstLaunch

          echo "::group::Xcode 信息"
          xcodebuild -version
          echo "::endgroup::"

          # ============================================================
          #  第二步：检查当前 iOS SDK 版本
          # ============================================================
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo "none")
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "none")

          echo "::group::当前 iOS SDK"
          echo "版本: $SDK_VER"
          echo "路径: $SDK_PATH"
          echo "::endgroup::"

          # ============================================================
          #  第三步：检查所有可用的 SDK，确定 iOS 最新版本号
          # ============================================================
          # xcodebuild -showsdks 输出所有 SDK，解析最新 iOS 版本
          LATEST_IOS_SDK=$(xcodebuild -showsdks 2>/dev/null \
            | grep -oE 'iphoneos[0-9]+\.[0-9]+' \
            | sort -t'.' -k1,1n -k2,2n \
            | tail -1 \
            | sed 's/iphoneos//' || echo "")

          echo "::group::SDK 分析"
          echo "Xcode 内置最新 iOS SDK:  $LATEST_IOS_SDK"
          echo "当前实际使用 iOS SDK:    $SDK_VER"
          echo "::endgroup::"

          # ============================================================
          #  第四步：判断是否需要更新
          # ============================================================
          if [ "$SDK_VER" = "$LATEST_IOS_SDK" ] && [ "$SDK_VER" != "none" ]; then
            echo "✅ iOS SDK 已是最新版本 $SDK_VER，无需更新"
          else
            echo "⚠️ 当前 $SDK_VER ≠ 最新 $LATEST_IOS_SDK，开始更新..."

            # 彻底清理 CoreSimulator 环境（downloadPlatform 报错的根因）
            sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
            sudo killall -9 Simulator 2>/dev/null || true
            sudo rm -rf ~/Library/Developer/CoreSimulator/Caches 2>/dev/null || true
            sudo rm -rf /tmp/com.apple.CoreSimulator* 2>/dev/null || true

            # 重新初始化 CoreSimulator 服务
            xcrun simctl list 2>/dev/null || true
            sleep 8

            # 尝试方式一：xcodebuild -downloadPlatform
            echo "::group::尝试 downloadPlatform"
            if xcodebuild -downloadPlatform iOS 2>&1; then
              echo "✅ downloadPlatform 成功"
            else
              echo "⚠️ downloadPlatform 失败，尝试 softwareupdate..."
              echo "::endgroup::"

              # 尝试方式二：softwareupdate（不同机制，可能成功）
              echo "::group::尝试 softwareupdate"
              sudo softwareupdate -ia 2>&1 || true
              echo "::endgroup::"
            fi

            # 再次清理 + 重新初始化，让新 SDK 生效
            sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
            xcrun simctl list 2>/dev/null || true
            sleep 3
          fi

          # ============================================================
          #  第五步：最终验证
          # ============================================================
          FINAL_VER=$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo "none")
          FINAL_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "none")

          echo "::group::最终验证结果"
          echo "Xcode:          $(xcodebuild -version | head -1)"
          echo "iOS SDK 版本:   $FINAL_VER"
          echo "iOS SDK 路径:   $FINAL_PATH"
          echo "::endgroup::"

          if [ "$FINAL_VER" = "none" ]; then
            echo "::error::iOS SDK 完全不可用"
            exit 1
          fi

          if [[ "$FINAL_VER" != 26* ]]; then
            echo "::warning::iOS SDK 版本为 $FINAL_VER，非 26.x"
          fi

          echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 打包 iOS arm64
        run: flutter build ios --release --no-codesign

      - name: 生成 IPA
        id: build_ios
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          FILE_NAME="harvest_${VERSION}_arm64-ios.ipa"
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app ./Payload/Runner.app
          zip -r "$FILE_NAME" Payload
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          ls -l "$FILE_NAME"

      - name: 发布 iOS arm64 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: ${{ github.workspace }}/${{ steps.build_ios.outputs.file_name }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false


  web:
    runs-on: ubuntu-latest
    needs: [ linux, android, windows, macos_intel, macos_arm, ios ]
    if: >-
      always() &&
      !cancelled() &&
      (needs.linux.result == 'success') &&
      (needs.android.result == 'success') &&
      (needs.windows.result == 'success') &&
      (needs.macos_intel.result == 'success') &&
      (needs.macos_arm.result == 'success')

    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 指定 Flutter 版本
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'

      - name: 生成发行版变更日志
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREV_TAG..$CURRENT_TAG"
          fi

          RAW_LOG=$(git log $RANGE --pretty=format:"%H|%s" --no-merges | grep -v -E '^.*\|(chore|chore:)' || true)

          FEAT="" FIX="" DOCS="" REFACTOR="" PERF="" TEST="" UPDATE="" OTHER=""

          while IFS='|' read -r HASH MSG; do
            [ -z "$HASH" ] && continue
            PR_TITLE=""
            if [[ "$MSG" =~ \#([0-9]+) ]]; then
              PR_NUM="${BASH_REMATCH[1]}"
              PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title' 2>/dev/null || echo "")
            fi
            DISPLAY_MSG="$MSG"
            [ -n "$PR_TITLE" ] && DISPLAY_MSG="$PR_TITLE (#$PR_NUM)"
            DISPLAY_MSG="${DISPLAY_MSG//\"/}"
            DISPLAY_MSG="$(printf '%s' "$DISPLAY_MSG")"
            SHORT_HASH=$(echo "$HASH" | cut -c1-7)

            if [[ "$MSG" =~ ^feat ]]; then FEAT+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^fix ]]; then FIX+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^docs ]]; then DOCS+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^refactor ]]; then REFACTOR+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^perf ]]; then PERF+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^test ]]; then TEST+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            elif [[ "$MSG" =~ ^update ]]; then UPDATE+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            else OTHER+="\n- ${DISPLAY_MSG} (${SHORT_HASH})"
            fi
          done <<< "$RAW_LOG"

          FINAL_LOG=""
          [ -n "$FEAT" ] && FINAL_LOG+="\n### ✨ 新增功能\n${FEAT}\n"
          [ -n "$FIX" ] && FINAL_LOG+="\n### 🐛 修复问题\n${FIX}\n"
          [ -n "$DOCS" ] && FINAL_LOG+="\n### 📖 文档更新\n${DOCS}\n"
          [ -n "$REFACTOR" ] && FINAL_LOG+="\n### 🔨 重构\n${REFACTOR}\n"
          [ -n "$PERF" ] && FINAL_LOG+="\n### ⚡ 性能优化\n${PERF}\n"
          [ -n "$TEST" ] && FINAL_LOG+="\n### 🧪 测试相关\n${TEST}\n"
          [ -n "$UPDATE" ] && FINAL_LOG+="\n### 🔄 更新\n${UPDATE}\n"
          [ -n "$OTHER" ] && FINAL_LOG+="\n### 📌 其他变更\n${OTHER}\n"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 打包 Web 发行版
        run: flutter build web --release --no-tree-shake-icons

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.TOKEN_GITHUB }}
          publish_dir: ./build/web
          publish_branch: web-dist

      - name: 生成 Web 发行版文件名
        id: build_web
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          FILE_NAME="harvest_${VERSION}_web.tar.gz"
          tar -czvf $FILE_NAME -C build/web .
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT
          ls -l $FILE_NAME

      - name: 发布 Web 发行版到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          files: ${{ github.workspace }}/${{ steps.build_web.outputs.file_name }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
          draft: ${{ startsWith(github.ref, 'refs/tags/') == false }}
          prerelease: false
          body: |
            ## 📌 更新日志
            ${{ steps.changelog.outputs.changelog }}

      - name: 生成链接并发布到 Repeat Publish API
        id: gen_links
        shell: bash
        run: |
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"
          PUBLISH_URL="https://repeat.ptools.fun/api/app/upload"
          TOKEN="${{ secrets.HARVEST_TOKEN }}"
          EMAIL="${{ secrets.HARVEST_EMAIL }}"
          VERSION="${{ steps.build_web.outputs.app_version }}"
          BASE_URL="https://github.com/ngfchl/harvest_flutter/releases/download/$VERSION"

          # ============================================
          # 根据各 job 结果，动态生成下载链接
          # ============================================
          LINKS_JSON=$(jq -n --arg v "$VERSION" --arg base "$BASE_URL" '
          {
            ("harvest_\($v)_x64_linux.tar.gz"):   "\($base)/harvest_\($v)_x64_linux.tar.gz",
            ("harvest_\($v)_arm64-android.apk"):  "\($base)/harvest_\($v)_arm64-android.apk",
            ("harvest_\($v)_x86_64-windows.zip"):  "\($base)/harvest_\($v)_x86_64-windows.zip",
            ("harvest_\($v)_x86_64-windows-setup.exe"): "\($base)/harvest_\($v)_x86_64-windows-setup.exe",
            ("harvest_\($v)_x86_64-macos.dmg"):    "\($base)/harvest_\($v)_x86_64-macos.dmg",
            ("harvest_\($v)_arm64-macos.dmg"):     "\($base)/harvest_\($v)_arm64-macos.dmg",
            ("harvest_\($v)_x86_64-macos.pkg"):    "\($base)/harvest_\($v)_x86_64-macos.pkg",
            ("harvest_\($v)_arm64-macos.pkg"):     "\($base)/harvest_\($v)_arm64-macos.pkg",
            ("harvest_\($v)_web.tar.gz"):          "\($base)/harvest_\($v)_web.tar.gz"
          }
          ')

          # 只有 iOS 成功时才加入 iOS 链接
          IOS_RESULT="${{ needs.ios.result }}"
          echo "iOS job 状态: $IOS_RESULT"

          if [ "$IOS_RESULT" = "success" ]; then
            LINKS_JSON=$(echo "$LINKS_JSON" | jq \
              --arg v "$VERSION" \
              --arg base "$BASE_URL" \
              '. + {
                ("harvest_\($v)_arm64-ios.ipa"): "\($base)/harvest_\($v)_arm64-ios.ipa"
              }')
            echo "✅ 已添加 iOS 下载链接"
          else
            echo "⚠️ iOS 构建失败 ($IOS_RESULT)，跳过 iOS 下载链接"
          fi

          echo "最终下载链接:"
          echo "$LINKS_JSON" | jq .

          REQUEST_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --argjson links "$LINKS_JSON" \
            '{
              version: $version,
              changelog: $changelog,
              downloadLinks: $links
            }')

          curl -X POST "$PUBLISH_URL" \
            -H "Authorization: $TOKEN" \
            -H "EMAIL: $EMAIL" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_JSON"
